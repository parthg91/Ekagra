<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moksha Protocol Intercept</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --text: #ffffff;
      --accent: #00ffcc;
      --accent-glow: rgba(0, 255, 204, 0.4);
    }
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      background: linear-gradient(145deg, #121212, #0a0a0a);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
      animation: fadeIn 0.8s ease-out;
    }
    h1 {
      font-size: 42px;
      margin: 0 0 16px 0;
      letter-spacing: -1px;
      font-weight: 800;
      text-transform: uppercase;
      background: linear-gradient(90deg, #fff, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 18px;
      color: #aaa;
      margin: 0 0 40px 0;
      line-height: 1.5;
    }
    .highlight {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
    }
    button {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
      padding: 16px 32px;
      font-size: 16px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px var(--accent-glow);
    }
    button:hover {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 25px var(--accent-glow);
      transform: translateY(-2px);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="highlight">Moksha Protocol</span> Active</h1>
    <p>You attempted to open a Short.<br>Get back to work.</p>
    <button onclick="window.location.href='https://www.youtube.com'">Return to Safety</button>
  </div>
</body>
</html>
